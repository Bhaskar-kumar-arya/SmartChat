appId: com.electron.smartchat
productName: smartchat
directories:
  buildResources: build
files:
  - '**/*'
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md,tsconfig.web.tsbuildinfo}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!node_modules/.prisma/**/*'
  - '!node_modules/@prisma/client/**/*'
  - '!node_modules/@prisma/client-runtime-utils/**/*'
  - '!dev_only/**/*'
  - '!prisma/dev.db'
  - '!node_modules/onnxruntime-node/bin/napi-v6/darwin/**/*'
  - '!node_modules/onnxruntime-node/bin/napi-v6/linux/**/*'
  - '!node_modules/@xenova/transformers/node_modules/onnxruntime-node/bin/napi-v3/darwin/**/*'
  - '!node_modules/@xenova/transformers/node_modules/onnxruntime-node/bin/napi-v3/linux/**/*'
asarUnpack:
  - resources/**
  - node_modules/sqlite-vec-windows-x64/**
extraResources:
  - from: node_modules/.prisma
    to: node_modules/.prisma
  - from: node_modules/@prisma/client
    to: node_modules/@prisma/client
  - from: node_modules/@prisma/client-runtime-utils
    to: node_modules/@prisma/client-runtime-utils
win:
  executableName: smartchat
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
